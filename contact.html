<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact — Simple Earning</title>
  <meta name="description" content="Contact page." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="top">
    <div class="wrap">
      <a class="logo" href="index.html">Simple Earning</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="blog.html">Blog</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy</a>
      </nav>
    </div>
  </header>

  <main class="wrap page">
    <h1>Contact</h1>
    <div class="box">
      <p><strong>Email:</strong> you@example.com (replace this with your email)</p>
      <p class="small">GitHub Pages cannot send emails directly. Add your email or link a Google Form later.</p>

      <h2>Message template</h2>
      <form class="form" onsubmit="alert('Copy your message and email it to: you@example.com'); return false;">
        <input placeholder="Your name" required />
        <input type="email" placeholder="Your email" required />
        <textarea placeholder="Your message" required></textarea>
        <button class="btn" type="submit">Send</button>
      </form>
    </div>
  </main>

  <footer class="foot">
    <div class="wrap">
      <p>© 2026 Simple Earning Site</p>
    </div>
  </footer>
</body>
</html>
